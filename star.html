<!DOCTYPE html>
<html>
<head>
    <title>SVG Star</title>
</head>
<body>

<svg width="300" height="300">

    <!-- Define Star Shape -->
    <defs>
        <polygon id="star"
            points="100,10 120,80 190,80 135,125
                    155,190 100,150 45,190 65,125
                    10,80 80,80"
            fill="gold"
            stroke="black"
            stroke-width="3"/>
    </defs>

    <!-- Use the Star -->
    <use href="#star"></use>

</svg>

</body>
</html>
