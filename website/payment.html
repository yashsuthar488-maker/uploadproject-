<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="header"></div>
    <section class="form-box">
        <h2>Payment Details</h2>
        <div class="payment-methods">
            <label>
                <input type="radio" name="paymentMethod" value="card" checked>
                Credit Card OR Debit Card
            </label>
            <label>
                <input type="radio" name="paymentMethod" value="upi">
                UPI QR
            </label>
           
        </div>
</script>

</body>
</html>
        <form id="payment-form">
            <div id="card-section">
                <input type="text" id="card-holder" placeholder="Card Holder Name" required>
                <input type="text" id="card-number" placeholder="Card Number" maxlength="16" required>
                <div class="row">
                    <input type="text" id="expiry-date" placeholder="Expiry Date (MM/YY)" maxlength="6" required>
                    <select id="card-type" required>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Debit Card">Debit Card</option>
                    </select>
                </div>
                <div class="card-icons">
                    <img src="https://th.bing.com/th/id/OIP.7nRBcZnLOgI6xQMEXuA3JAHaEH?o=7rm=3&rs=1&pid=ImgDetMain" alt="Card Types" width="150">
                </div>
            </div>
            <div id="upi-section" style="display:none;">
                <p>scan the QR code below with your UPI app and enter your UPI ID.</p>
                <img src="QR.jpeg" alt="UPI QR Code" class="upi-qr" width="200" height="200">
                <input type="text" id="upi-id" placeholder="Enter UPI ID (example@okhdfc)">
            </div>
            <button type="button" id="complete-payment" class="btn">
                Complete Purchase
            </button>
        </form>
        <p id="payment-message" class="payment-message"></p>
        <div id="receipt" class="receipt" style="display:none;">
            <h3>Payment Receipt</h3>
            <p><strong>Payment Method:</strong> <span id="receipt-method"></span></p>
            <p id="receipt-card-details"></p>
            <p><strong>Amount Paid:</strong> <span id="receipt-amount"></span></p>
            <p><strong>Transaction ID:</strong> <span id="receipt-transaction"></span></p>
            <p><strong>Date:</strong> <span id="receipt-date"></span></p>
            <p><strong>Carmodel:</strong> <span id="receipt-car-model"></span></p>
            <p>Thank you for your purchase! We hope you enjoy your ride.
            </p>
            <button type="button" id="print-receipt" class="btn">Print Receipt</button>
        </div>
    </section>
    <div id="footer"></div>
    <script>
        function fetchTemplate(url, elementId) {
            fetch(url)
                .then(function(response) { return response.text(); })
                .then(function(data) {
                    document.getElementById(elementId).innerHTML = data;
                });
        }

        fetchTemplate('header.html', 'header');
        fetchTemplate('footer.html', 'footer');

        var paymentRadios = document.querySelectorAll('input[name="paymentMethod"]');
        var cardSection = document.getElementById('card-section');
        var upiSection = document.getElementById('upi-section');
        var message = document.getElementById('payment-message');
        var receipt = document.getElementById('receipt');
        var receiptMethod = document.getElementById('receipt-method');
        var receiptAmount = document.getElementById('receipt-amount');
        var receiptTransaction = document.getElementById('receipt-transaction');
        var receiptDate = document.getElementById('receipt-date');
        var receiptCardDetails = document.getElementById('receipt-card-details');
        var receiptCarModel = document.getElementById('receipt-car-model');
        var printReceipt = document.getElementById('print-receipt');

        function loadCartTotal() {
            var cartText = localStorage.getItem('carRentalCart');
            if (!cartText) {
                return 0;
            }
            try {
                var cart = JSON.parse(cartText);
            } catch (e) {
                return 0;
            }
            var total = 0;
            for (var i = 0; i < cart.length; i++) {
                var item = cart[i];
                var price = 0;
                if (item.id === 'bmw-x5') price = 5000;
                if (item.id === 'audi-a6') price = 4500;
                if (item.id === 'mercedes-c-class') price = 6000;
                if (item.id === 'lamborghini-huracan') price = 25000;
                if (item.id === 'mustang-gt') price = 12000;
                if (item.id === 'rolls-royce-ghost') price = 45000;
                if (item.id === 'pagani-huayra') price = 55000;
                if (item.id === 'toyota-fortuner') price = 9000;
                total += price * (item.days || 1);
            }
            return total;
        }

        function getCartModels() {
            var cartText = localStorage.getItem('carRentalCart');
            if (!cartText) {
                return 'Not available';
            }
            try {
                var cart = JSON.parse(cartText);
            } catch (e) {
                return 'Not available';
            }
            if (!Array.isArray(cart) || cart.length === 0) {
                return 'Not available';
            }
            var modelNames = [];
            for (var i = 0; i < cart.length; i++) {
                var item = cart[i];
                if (item.model) {
                    modelNames.push(item.model);
                } else if (item.name) {
                    modelNames.push(item.name);
                } else if (item.id === 'bmw-x5') {
                    modelNames.push('BMW X5');
                } else if (item.id === 'audi-a6') {
                    modelNames.push('Audi A6');
                } else if (item.id === 'mercedes-c-class') {
                    modelNames.push('Mercedes C-Class');
                } else if (item.id === 'lamborghini-huracan') {
                    modelNames.push('Lamborghini Huracan');
                } else if (item.id === 'mustang-gt') {
                    modelNames.push('Mustang GT');
                } else if (item.id === 'rolls-royce-ghost') {
                    modelNames.push('Rolls Royce Ghost');
                } else if (item.id === 'pagani-huayra') {
                    modelNames.push('Pagani Huayra');
                } else if (item.id === 'land-rover-defender') {
                    modelNames.push('Land Rover Defender');
                }
            }
            if (modelNames.length === 0) {
                return 'Not available';
            }
            return modelNames.join(', ');
        }

        function updatePaymentSection() {
            var method = document.querySelector('input[name="paymentMethod"]:checked').value;
            if (method === 'card') {
                cardSection.style.display = 'block';
                upiSection.style.display = 'none';
            } else {
                cardSection.style.display = 'none';
                upiSection.style.display = 'block';
            }
            message.innerText = '';
            receipt.style.display = 'none';
        }

        for (var i = 0; i < paymentRadios.length; i++) {
            paymentRadios[i].addEventListener('change', updatePaymentSection);
        }

        function formatRupees(value) {
            return '₹' + value;
        }

        function generateTransactionId() {
            return 'TX' + Math.floor(Math.random() * 10000000);
        }

        document.getElementById('complete-payment').onclick = function() {
            var method = document.querySelector('input[name="paymentMethod"]:checked').value;
            var total = loadCartTotal();
            if (method === 'card') {
                var cardHolder = document.getElementById('card-holder').value.trim();
                var cardNumber = document.getElementById('card-number').value.trim();
                var expiryDate = document.getElementById('expiry-date').value.trim();
                var cardType = document.getElementById('card-type').value;

                if (!cardHolder || !cardNumber || !expiryDate || !cardType) {
                    message.innerText = 'Please fill in all card fields.';
                    return;
                }

                var sanitized = cardNumber.replace(/\D/g, '');
                if (sanitized.length < 12) {
                    message.innerText = 'Please enter valid card details.';
                    return;
                }

                message.innerText = 'Payment completed successfully with ' + cardType + '.';
            } else {
                var upiId = document.getElementById('upi-id').value.trim();
                if (!upiId) {
                    message.innerText = 'Please enter your UPI ID.';
                    return;
                }
                message.innerText = 'Payment completed successfully with UPI QR.';
            }

            var methodLabel = 'UPI QR' ; 
            if (method === 'card') {
                methodLabel = cardType || 'Card';
            }
            receiptMethod.innerText = methodLabel;
            if (method === 'card') {
                var masked = 'Card Ending: ****' + (sanitized.slice(-4) || '');
                receiptCardDetails.innerText = masked + (cardHolder ? ' | ' + cardHolder : '');
            } else {
                receiptCardDetails.innerText = '';
            }
            receiptAmount.innerText = formatRupees(total);
            receiptTransaction.innerText = generateTransactionId();
            receiptDate.innerText = new Date().toLocaleString();
            receiptCarModel.innerText = getCartModels();
            receipt.style.display = 'block';
        };

        printReceipt.onclick = function() {
            window.print();
        };
       

</script>

</body>
</html>

        updatePaymentSection();
    </script>
</body>
</html>
