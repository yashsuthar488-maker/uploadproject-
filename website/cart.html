<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | CarRentalHub</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="header"></div>

    <section class="cart-section">

        <h1>Your Cart</h1>

        <div id="cart-items"></div>

    </section>

    <section class="cart-section">
        <div class="cart-card">
            <div class="cart-content">
                <h2>Cart Summary</h2>
                <p>Grand Total: <span id="grand-total">₹0</span></p>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script>
        var products = {
            'bmw-x5': {
                title: 'BMW X5',
                pricePerDay: 5000
            },
            'audi-a6': {
                title: 'Audi A6',
                pricePerDay: 4500
            },
            'mercedes-c-class': {
                title: 'Mercedes C-Class',
                pricePerDay: 6000
            },
            'lamborghini-huracan': {
                title: 'Lamborghini Huracan',
                pricePerDay: 25000
            },
            'mustang-gt': {
                title: 'Mustang GT',
                pricePerDay: 12000
            },
            'rolls-royce-ghost': {
                title: 'Rolls-Royce Ghost',
                pricePerDay: 45000
            },
            'pagani-huayra': {
                title: 'Pagani Huayra',
                pricePerDay: 55000
            },
            'land-rover-defender': {
                title: 'Land Rover Defender',
                pricePerDay: 4000
            }
        };

        function loadTemplate(url, elementId) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    document.getElementById(elementId).innerHTML = xhr.responseText;
                }
            };
            xhr.send();
        }

        loadTemplate('header.html', 'header');
        loadTemplate('footer.html', 'footer');

        var cartKey = 'carRentalCart';

        function loadCart() {
            var text = localStorage.getItem(cartKey);
            if (text) {
                return JSON.parse(text);
            }
            return [];
        }

        function saveCart(cart) {
            localStorage.setItem(cartKey, JSON.stringify(cart));
        }

        function formatRupees(value) {
            return '₹' + value;
        }

        function updateTotals() {
            var items = document.querySelectorAll('.cart-item');
            var grandTotal = 0;
            var cart = loadCart();

            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var price = Number(item.getAttribute('data-price'));
                var id = item.getAttribute('data-id');
                var daysInput = item.querySelector('.day-input');
                var totalElement = item.querySelector('.item-total');
                var days = Number(daysInput.value) || 1;
                if (days < 1) {
                    days = 1;
                    daysInput.value = 1;
                }
                var itemTotal = price * days;
                totalElement.innerText = formatRupees(itemTotal);
                grandTotal += itemTotal;

                for (var j = 0; j < cart.length; j++) {
                    if (cart[j].id === id) {
                        cart[j].days = days;
                    }
                }
            }

            saveCart(cart);
            document.getElementById('grand-total').innerText = formatRupees(grandTotal);
        }

        function removeCartItem(itemId) {
            var cart = loadCart();
            var newCart = [];
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id !== itemId) {
                    newCart.push(cart[i]);
                }
            }
            saveCart(newCart);
            renderCart();
        }

        function renderCart() {
            var cartItems = document.getElementById('cart-items');
            var cart = loadCart();

            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="cart-card">\n' +
                    '    <div class="cart-content">\n' +
                    '        <p>Your cart is empty. Add a car from product page.</p>\n' +
                    '    </div>\n' +
                    '</div>';
                document.getElementById('grand-total').innerText = formatRupees(0);
                return;
            }

            var html = '';
            for (var i = 0; i < cart.length; i++) {
                var entry = cart[i];
                var product = products[entry.id];
                if (!product) {
                    continue;
                }
                html += '<div class="cart-card">\n' +
                    '    <div class="cart-content cart-item" data-id="' + entry.id + '" data-price="' + product.pricePerDay + '">\n' +
                    '        <h2>' + product.title + '</h2>\n' +
                    '        <p>Rental Price: ' + formatRupees(product.pricePerDay) + ' / day</p>\n' +
                    '        <label>\n' +
                    '            Total Days:\n' +
                    '            <input type="number" class="day-input" min="1" value="' + (entry.days || 1) + '">\n' +
                    '        </label>\n' +
                    '        <p>Total Amount: <span class="item-total">' + formatRupees(product.pricePerDay * (entry.days || 1)) + '</span></p>\n' +
                    '        <button type="button" class="remove-item btn">Remove</button>\n' +
                    '        <a href="payment.html" class="btn">Proceed To Payment</a>\n' +
                    '    </div>\n' +
                    '</div>';
            }
            cartItems.innerHTML = html;

            var inputs = document.querySelectorAll('.day-input');
            for (var i = 0; i < inputs.length; i++) {
                inputs[i].oninput = updateTotals;
            }

            var removes = document.querySelectorAll('.remove-item');
            for (var i = 0; i < removes.length; i++) {
                removes[i].onclick = function() {
                    var card = this.parentNode;
                    var id = card.getAttribute('data-id');
                    removeCartItem(id);
                };
            }

            updateTotals();
        }

        renderCart();
    </script>

</body>

</html>
